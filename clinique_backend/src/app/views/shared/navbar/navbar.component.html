<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/">
      <div class="nav-icon">
        <i class="bi bi-flower1 text-white"></i>
      </div>
      <span class="fw-bold text-success">MediClinic</span>
    </a>
    
    <button class="navbar-toggler border-0" type="button" (click)="isMenuOpen = !isMenuOpen">
      <i class="bi" [class.bi-list]="!isMenuOpen" [class.bi-x-lg]="isMenuOpen"></i>
    </button>
    
    <div class="collapse navbar-collapse" [class.show]="isMenuOpen">
      <ul class="navbar-nav ms-auto align-items-center gap-2">
        <li class="nav-item">
          <a class="nav-link px-3" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            Accueil
          </a>
        </li>
        
        @if (!authService.isLoggedIn()) {
          <li class="nav-item">
            <a class="nav-link px-3" routerLink="/login" routerLinkActive="active">Connexion</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-success rounded-pill px-4" routerLink="/register">
              S'inscrire
            </a>
          </li>
        } @else {
          <li class="nav-item dropdown">
            <button class="btn btn-light rounded-pill d-flex align-items-center gap-2" 
                    (click)="isDropdownOpen = !isDropdownOpen">
              <div class="user-avatar bg-success text-white">
                {{ (authService.currentUser()?.prenom || 'U').charAt(0).toUpperCase() }}
              </div>
              <span class="d-none d-sm-inline">{{ authService.currentUser()?.prenom }}</span>
              <i class="bi bi-chevron-down small"></i>
            </button>
            
            @if (isDropdownOpen) {
              <ul class="dropdown-menu show end-0 mt-2 shadow-lg border-0 rounded-3">
                <li class="dropdown-header text-uppercase small text-muted">
                  {{ authService.userRole() }}
                </li>
                <li>
                  <a class="dropdown-item py-2" [routerLink]="dashboardLink">
                    <i class="bi bi-speedometer2 me-2 text-success"></i>Tableau de bord
                  </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                  <button class="dropdown-item py-2 text-danger" (click)="logout()">
                    <i class="bi bi-box-arrow-right me-2"></i>Déconnexion
                  </button>
                </li>
              </ul>
            }
          </li>
        }
      </ul>
    </div>
  </div>
</nav>
