          <a class="nav-link" routerLink="/medecin/dashboard" routerLinkActive="active">

        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/medecin/patients" routerLinkActive="active">
            <i class="bi bi-people me-1"></i>Mes Patients
          </a>

        <li class="nav-item">

          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/medecin/dossiers" routerLinkActive="active">
