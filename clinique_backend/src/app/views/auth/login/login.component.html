<div class="auth-wrapper">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100 py-5">
      <div class="col-md-5 col-lg-4">
        <div class="auth-card animate-fade-in-up">
          <!-- Logo -->
          <div class="text-center mb-4">
            <div class="brand-icon mx-auto mb-3">
              <i class="bi bi-heart-pulse-fill text-white display-5"></i>
            </div>
            <h2 class="fw-bold text-success mb-1">MediClinic</h2>
            <p class="text-muted small">Votre santé, notre priorité</p>
          </div>

          <!-- Alert -->
          @if (errorMessage) {
            <div class="alert alert-danger d-flex align-items-center mb-3">
              <i class="bi bi-exclamation-triangle-fill me-2"></i>
              <small>{{ errorMessage }}</small>
            </div>
          }

          <!-- Form -->
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label small fw-semibold text-muted">Email</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">
                  <i class="bi bi-envelope text-muted"></i>
                </span>
                <input 
                  type="email" 
                  class="form-control border-start-0 ps-0"
                  [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
                  formControlName="email"
                  placeholder="votre@email.com">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-semibold text-muted">Mot de passe</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">
                  <i class="bi bi-lock text-muted"></i>
                </span>
                <input 
                  [type]="showPassword ? 'text' : 'password'"
                  class="form-control border-start-0 border-end-0 ps-0"
                  [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
                  formControlName="password"
                  placeholder="••••••••">
                <button 
                  type="button" 
                  class="input-group-text bg-light border-start-0"
                  (click)="showPassword = !showPassword">
                  <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
                </button>
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label small text-muted" for="remember">
                  Se souvenir de moi
                </label>
              </div>
              <a href="#" class="small text-success text-decoration-none">Mot de passe oublié ?</a>
            </div>

            <button 
              type="submit" 
              class="btn btn-primary w-100 py-3"
              [disabled]="isLoading">
              @if (isLoading) {
                <span class="spinner-border spinner-border-sm me-2"></span>
                Connexion...
              } @else {
                <i class="bi bi-arrow-right-circle me-2"></i>Se connecter
              }
            </button>
          </form>

          <!-- Divider -->
          <div class="divider my-4">
            <span class="divider-text">ou</span>
          </div>

          <!-- Register link -->
          <p class="text-center text-muted mb-0">
            Pas encore de compte ? 
            <a routerLink="/register" class="text-success fw-semibold text-decoration-none">
              S'inscrire
            </a>
          </p>

          <!-- Back link -->
          <div class="text-center mt-3">
            <a routerLink="/welcome" class="small text-muted text-decoration-none">
              <i class="bi bi-arrow-left me-1"></i>Retour à l'accueil
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
