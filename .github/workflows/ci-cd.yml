name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Backend - Maven compile (skip tests)
      run: |
        cd Clinique
        mvn clean compile -DskipTests
    
    - name: Frontend - Build
      run: |
        cd clinique_frontend
        npm ci
        npm run build
    
    - name: SonarQube Scan (skip tests)
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        cd Clinique
        mvn sonar:sonar -DskipTests \
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
          -Dsonar.organization=${{ secrets.SONAR_ORG }} \
          -Dsonar.host.url=https://sonarcloud.io
    
    - name: Build and push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./Clinique
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/clinique-backend:latest
    
    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./clinique_frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/clinique-frontend:latest