name: CI/CD Pipeline

on:
  push:
    branches: [preprod, prod]
  pull_request:
    branches: [preprod]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository_owner }}/clinique-backend
  FRONTEND_IMAGE: ${{ github.repository_owner }}/clinique-frontend

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Backend
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Backend - Maven compile
        run: cd Clinique && mvn clean compile

      - name: Backend - Maven tests (disabled)
        run: cd Clinique && mvn test -DskipTests

      # Frontend (React)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend - Install dependencies
        run: cd clinique_frontend && npm ci

      - name: Frontend - Lint
        run: cd clinique_frontend && npm run lint --if-present

      - name: Frontend - Build
        run: cd clinique_frontend && npm run build

      # SonarQube - TEMPORARILY DISABLED
      # - name: SonarQube Scan
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #   run: |
      #     cd Clinique
      #     mvn sonar:sonar \
      #       -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
      #       -Dsonar.organization=${{ secrets.SONAR_ORG }} \
      #       -Dsonar.host.url=https://sonarcloud.io

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend image
        run: docker build -t backend-scan ./Clinique

      - name: Build Frontend image
        run: docker build -t frontend-scan ./clinique_frontend

      - name: Trivy - Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'backend-scan'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Trivy - Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'frontend-scan'
          severity: 'CRITICAL'
          exit-code: '1'

  docker-push:
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/prod'
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Clinique
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./clinique_frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest