<!-- consultation-form.component.html -->
<div class="consultation-container">
  <div class="container py-4">
    <!-- En-tête -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="fw-bold text-primary">
          <i class="bi bi-file-medical me-2"></i>Nouvelle Consultation
        </h2>
        <p class="text-muted mb-0">Remplissez les informations de la consultation</p>
      </div>
      <button class="btn btn-outline-secondary" (click)="retourListeRdv()">
        <i class="bi bi-arrow-left me-2"></i>Retour
      </button>
    </div>

    <!-- Informations patient -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <div class="row">
          <div class="col-md-6">
            <label class="text-muted small">Patient</label>
            <h5 class="mb-0">{{ patientPrenom }} {{ patientNom }}</h5>
          </div>
          <div class="col-md-3">
            <label class="text-muted small">Date</label>
            <p class="mb-0">{{ rdvDate | date:'dd/MM/yyyy' }}</p>
          </div>
          <div class="col-md-3">
            <label class="text-muted small">Heure</label>
            <p class="mb-0">{{ rdvHeure }}</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Formulaire -->
    <form [formGroup]="consultationForm" (ngSubmit)="saveConsultation()">
      <!-- Étape 1: Diagnostic -->
      <div class="card shadow-sm mb-4">
        <div class="card-header bg-white">
          <h5 class="mb-0 text-primary">1. Diagnostic</h5>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">Diagnostic *</label>
            <textarea formControlName="diagnostic" 
                      class="form-control" 
                      rows="3"
                      placeholder="Description du diagnostic..."></textarea>
            <div class="invalid-feedback" *ngIf="consultationForm.get('diagnostic')?.invalid && consultationForm.get('diagnostic')?.touched">
              Le diagnostic est requis
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Traitement</label>
            <textarea formControlName="traitement" 
                      class="form-control" 
                      rows="2"
                      placeholder="Traitement prescrit..."></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Ordonnance</label>
            <textarea formControlName="ordonnance" 
                      class="form-control" 
                      rows="2"
                      placeholder="Médicaments prescrits..."></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Notes</label>
            <textarea formControlName="notes" 
                      class="form-control" 
                      rows="2"
                      placeholder="Informations complémentaires..."></textarea>
          </div>
        </div>
      </div>

      <!-- Étape 2: Facturation -->
      <div class="card shadow-sm mb-4">
        <div class="card-header bg-white">
          <h5 class="mb-0 text-primary">2. Facturation</h5>
        </div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Prix consultation (DHS) *</label>
              <input type="number" 
                     formControlName="prixConsultation" 
                     class="form-control"
                     min="0"
                     step="10">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Médicaments (DHS)</label>
              <input type="number" 
                     formControlName="montantMedicaments" 
                     class="form-control"
                     min="0"
                     step="10">
            </div>
          </div>

          <div class="alert alert-primary">
            <div class="d-flex justify-content-between align-items-center">
              <span class="fw-semibold">Total à payer :</span>
              <span class="fw-bold fs-5">{{ montantTotal }} DHS</span>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Statut paiement</label>
            <select formControlName="statutPaiement" class="form-select">
              <option value="EN_ATTENTE">En attente</option>
              <option value="PAYE">Payé</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="d-flex gap-3 justify-content-end">
        <button type="button" class="btn btn-outline-secondary" (click)="retourListeRdv()">
          Annuler
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="saving || consultationForm.invalid">
          <i class="bi bi-save me-2"></i>
          {{ saving ? 'Enregistrement...' : 'Enregistrer la consultation' }}
        </button>
      </div>
    </form>
  </div>
</div>
