<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" 
       href="javascript:void(0)"
       (click)="navigateTo('/')">
      <div class="nav-icon">
        <i class="bi bi-flower1 text-white"></i>
      </div>
      <span class="fw-bold text-success">MediClinic</span>
    </a>
    
    <button class="navbar-toggler border-0" type="button" (click)="isMenuOpen = !isMenuOpen">
      <i class="bi" [class.bi-list]="!isMenuOpen" [class.bi-x-lg]="isMenuOpen"></i>
    </button>
    
    <div class="collapse navbar-collapse" [class.show]="isMenuOpen">
      <ul class="navbar-nav ms-auto align-items-center gap-2">
        <li class="nav-item">
          <a class="nav-link px-3" href="javascript:void(0)" (click)="navigateTo('/')">
            Accueil
          </a>
        </li>
        
        <!-- UNIQUEMENT pour non-connectés -->
        @if (!authService.isLoggedIn()) {
          <li class="nav-item">
            <a class="nav-link px-3" href="javascript:void(0)" (click)="navigateTo('/login')">
              Connexion
            </a>
          </li>
          <li class="nav-item">
            <a class="btn btn-success rounded-pill px-4" href="javascript:void(0)" (click)="navigateTo('/register')">
              S'inscrire
            </a>
          </li>
        } @else {
          <!-- Si connecté mais sur cette navbar (ne devrait pas arriver), afficher déconnexion -->
          <li class="nav-item">
            <button class="btn btn-outline-danger rounded-pill px-4" (click)="logout()">
              <i class="bi bi-box-arrow-right me-2"></i>Déconnexion
            </button>
          </li>
        }
      </ul>
    </div>
  </div>
</nav>
