services:
  mysql:
    image: mysql:8.0
    container_name: clinique-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clinique_DB
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clinique-network

  backend:
    build: ../Clinique
    container_name: clinique-backend
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - clinique-network

  frontend:
    build: ../clinique_frontend
    container_name: clinique-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - clinique-network

volumes:
  mysql_data:

networks:
  clinique-network:
    driver: bridge